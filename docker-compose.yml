# Hify 本地开发依赖。一期目标是 deployment.md 描述的「单机 4 容器」（nginx / hify-server /
# sandbox / postgres）；当前阶段只需要数据库，先放 postgres 一个服务，后续按 deployment.md 扩展。
#
# 用法：
#   docker compose up -d        # 启动
#   docker compose ps           # 查看状态（等 STATUS 显示 healthy）
#   docker compose down         # 停止（保留数据卷）
#   docker compose down -v      # 停止并清空数据
#
# 凭证默认值仅供本地开发；生产改用 .env 注入（CLAUDE.md：密码走 .env，不入库不入镜像）。

services:
  postgres:
    # pgvector 官方镜像 = PostgreSQL 16 + 预装 pgvector 扩展（后续 RAG 用得上，先备好）
    image: pgvector/pgvector:pg16
    container_name: hify-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hify}
      POSTGRES_USER: ${POSTGRES_USER:-hify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hify}
    ports:
      - "5432:5432"
    volumes:
      - hify-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hify} -d ${POSTGRES_DB:-hify}"]
      interval: 5s
      timeout: 3s
      retries: 10

  sandbox:
    build: ./sandbox
    container_name: hify-sandbox
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    networks:
      - sandbox-net
    mem_limit: 1g
    cpus: "1.0"
    tmpfs:
      - /tmp          # read_only 下给用户代码临时文件一块可写内存盘
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 5
    # 本地开发（server 跑在宿主机，尚未进 compose）临时把沙箱端口映射到宿主机联调；
    # server 进 compose 后删掉此 ports、仅留 sandbox-net 内网可达（deployment.md §5：沙箱不对外发布端口）。
    ports:
      - "127.0.0.1:8000:8000"

networks:
  sandbox-net:
    driver: bridge

volumes:
  hify-pgdata:
