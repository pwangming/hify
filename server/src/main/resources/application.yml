spring:
  application:
    name: hify-server

  # Java 21 虚拟线程（llm-resilience.md 第 1 节）：LLM/IO 调用阻塞 10~120s，虚拟线程让"同步阻塞"
  # 编程模型零成本扩展到数千并发，不上 WebFlux。Tomcat 请求线程与 @Async 任务都跑在虚拟线程上。
  threads:
    virtual:
      enabled: true

  # 数据库连接。本地默认连 docker-compose 起的 Postgres；生产用环境变量覆盖（密码走 .env）。
  datasource:
    # reWriteBatchedInserts：批量插入重写为多值 insert，chunk 批量写入快一个量级（database-standards §2.1）
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hify?reWriteBatchedInserts=true}
    username: ${SPRING_DATASOURCE_USERNAME:hify}
    password: ${SPRING_DATASOURCE_PASSWORD:hify}

    # HikariCP 连接池（database-standards.md 第 5 节）。连接是最稀缺资源，必须显式定参，
    # 不能用框架默认值（默认池大小 10、connection-timeout 30s，都不符合本项目设防策略）。
    hikari:
      pool-name: hify-pool
      # 池小且固定：虚拟线程再多也共享这 20 个连接，靠池内排队，不随并发膨胀。
      # 20 与 llm-resilience.md、scaling-path 阶段 1 对齐；扩容时按副本数重算。
      maximum-pool-size: 20
      minimum-idle: 20            # 与最大值同值 = 不伸缩，避免空闲回收后突发流量重新建连的抖动
      # 快速失败：3 秒拿不到连接就报错，把"连接被占光"的问题立刻暴露，而不是静默排队拖垮全站。
      connection-timeout: 3000
      max-lifetime: 1800000       # 30min：主动回收老连接，避开中间网络设备的空闲断连
      # 每条物理连接建立时执行一次，给会话设 SQL 语句超时上限：任何 SQL 跑过 30s 直接被 PG 中止，
      # 防失控查询占住连接。这是 database-standards 第 5.4 节"语句层"超时的落地点。
      connection-init-sql: "SET statement_timeout TO '30s'"

  # Flyway 管理数据库迁移。当前还没有迁移脚本（db/migration 为空），启动时建好历史表即可。
  flyway:
    enabled: true

  # 文件上传限制（api-standards §6：单文件 ≤50MB，与 nginx client_max_body_size 对齐）。
  # 超限由 GlobalExceptionHandler 转 10001。
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # 临时排除「还没用到」的自动装配，让骨架现在就能干净启动：
  #   - Spring AI（OpenAI/Anthropic/pgvector）：需要模型 API Key 与向量库初始化，等做 provider/RAG 再开；
  #   - UserDetailsServiceAutoConfiguration：本项目走 JWT，不用表单/内存用户体系；不排除会生成一个
  #     带随机密码的默认用户并打印到日志，纯属噪声。Security 本身已启用（见 infra.security.SecurityConfig）。
  # 实现到对应模块时，把相关行删掉即可恢复。
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# 暴露健康检查端点，便于冒烟验证启动是否成功
management:
  endpoints:
    web:
      exposure:
        include: health,info

# 日志：纯文本 pattern + traceId（deployment.md 拍板）。容器 json-file driver 负责落盘与滚动，
# server 内只需把 stdout 格式定好；%X{traceId} 取自 TraceIdFilter 写入 MDC 的值，
# 异步线程里的 traceId 由 AsyncConfig 的 MdcTaskDecorator 传递。无 traceId 的行（如启动期）显示 []。
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-}] [%thread] %logger{36} - %msg%n"

# MyBatis-Plus 全局配置
mybatis-plus:
  global-config:
    db-config:
      # 逻辑删除值：BaseEntity 的 deleted 是 boolean 列（database-standards.md 第 1.1 节），
      # 必须把删除/未删除值设为 true/false。否则 MP 默认用整数 1/0 生成 SQL（deleted=1 / deleted=0），
      # PostgreSQL 会报 "operator does not exist: boolean = integer"。
      logic-delete-value: "true"
      logic-not-delete-value: "false"

# Hify 自有配置（外化，不硬编码进代码）
hify:
  api:
    # 对外接口的时间统一归一到这个时区偏移再输出（ISO-8601 含偏移，固定到秒）。
    # 国内单团队部署默认东八区；不同时区部署时改这里，无需动代码。见 infra.config.JacksonConfig。
    time-zone-offset: ${HIFY_API_TIME_ZONE_OFFSET:+08:00}
  cache:
    # Caffeine 规格串：最大条目数 + 写入后过期时长。改容量/过期只动这里。
    spec: maximumSize=10000,expireAfterWrite=30m
  security:
    jwt:
      # HMAC-SHA256 签名密钥，至少 32 字节。生产必须用 .env 的 HIFY_JWT_SECRET 覆盖这个开发默认值
      # （敏感配置走环境变量，不在 application.yml 写真实密钥——CLAUDE.md 安全要点）。
      secret: ${HIFY_JWT_SECRET:dev-only-hify-jwt-secret-please-override-in-env-0123456789}
      # 令牌有效期（分钟），默认 1 天。
      expire-minutes: ${HIFY_JWT_EXPIRE_MINUTES:1440}
  async:
    # @Async 异步任务（事件监听落库等）并发上限。真正的瓶颈是 DB 连接池(20)，这里只是再加一道闸，
    # 防事件风暴等病态堆积。见 infra.config.AsyncConfig。
    concurrency-limit: ${HIFY_ASYNC_CONCURRENCY_LIMIT:64}
  identity:
    bootstrap-admin:
      # 首个 admin 账号引导：值走 .env，不配则启动时告警跳过（不创建空密码账号）。
      username: ${HIFY_ADMIN_USERNAME:}
      password: ${HIFY_ADMIN_PASSWORD:}
  knowledge:
    # 固定长度分段参数：每段字符数 / 相邻段重叠字符数（K2 spec 决策 4：全局默认，不做前端可调）。
    # 实际使用的参数会记录在 kb_document 行上，为将来重分段留底。改分段口径只动这里。
    chunk-size: ${HIFY_KNOWLEDGE_CHUNK_SIZE:500}
    chunk-overlap: ${HIFY_KNOWLEDGE_CHUNK_OVERLAP:50}
  provider:
    crypto:
      # 供应商 API Key 加密主密钥（AES-256-GCM，经 SHA-256 派生 32 字节密钥）。
      # 主密钥走 .env，生产务必用 HIFY_PROVIDER_MASTER_KEY 覆盖这个开发默认值（CLAUDE.md 安全要点）。
      master-key: ${HIFY_PROVIDER_MASTER_KEY:dev-only-hify-provider-master-key-please-override}
  conversation:
    memory:
      # 滑动窗口轮数 N：最近 N 轮(2N 条) + 当前消息进 prompt。改记忆长度只动这里。
      window-rounds: ${HIFY_CONVERSATION_WINDOW_ROUNDS:10}
    list:
      # 会话侧边栏返回的最近会话条数上限（按 update_time desc，不分页）。
      recent-limit: ${HIFY_CONVERSATION_LIST_LIMIT:50}
  usage:
    # 单用户每日 Token 上限（prompt+completion 累计）。入口配额检查：今日已用 >= 此值即拦（14001/429）。
    # 防失控 Agent 循环刷爆账单，非精确计费；宽松默认，生产按供应商额度调。改配额只动这里。
    daily-token-limit-per-user: ${HIFY_USAGE_DAILY_TOKEN_LIMIT_PER_USER:2000000}
